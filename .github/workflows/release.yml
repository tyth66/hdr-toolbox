name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows Release
    runs-on: windows-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests before release
        if: github.event_name != 'workflow_run'
        run: npm test

      - name: Build Tauri release
        run: npm run tauri build

      - name: Stage release assets
        shell: pwsh
        run: |
          $stage = "release-assets"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Copy-Item "src-tauri/target/release/hdr-toolbox.exe" "$stage/hdr-toolbox.exe"

          $setup = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File -Filter "*.exe" |
            Select-Object -First 1
          if ($setup) {
            Copy-Item $setup.FullName "$stage/hdr-toolbox-setup.exe"
          }

          $msi = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File -Filter "*.msi" |
            Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "$stage/hdr-toolbox.msi"
          }

          Get-ChildItem $stage

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hdr-toolbox-windows-release
          path: |
            release-assets/*
          if-no-files-found: error

      - name: Update rolling release tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f release
          git push -f origin release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          name: HDR Toolbox
          files: |
            release-assets/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          make_latest: true
          body: |
            Latest stable Windows build for HDR Toolbox.

            Assets use stable filenames without version suffixes.
