<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HDR Control - Windows 11 Style</title>
<!-- React and Babel for demo purposes in a single file -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Tailwind for base utility but moving themes to CSS variables -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --win-blue: #0078d4;
            --win-bg: #020617;
            --mica-bg: linear-gradient(to bottom, #1e293b, #0f172a);
            --mica-border: rgba(255, 255, 255, 0.08);
            --mica-border-top: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --surface-hover: rgba(255, 255, 255, 0.05);
            --surface-active: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--win-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI Variable', sans-serif;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        .mica-window {
            width: 300px;
            height: 200px;
            backdrop-filter: blur(40px);
            background: var(--mica-bg);
            border: 1px solid var(--mica-border);
            border-top-color: var(--mica-border-top);
            border-radius: 0.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .win-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            outline: none;
        }

        .win-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #ffffff;
            border: 3px solid var(--win-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 120, 212, 0.5);
            transition: transform 0.1s ease;
        }

        .win-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .win-toggle-track {
            width: 32px;
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .win-toggle-track.active {
            background: var(--win-blue);
            border-color: var(--win-blue);
        }

        .win-toggle-thumb {
            width: 10px;
            height: 10px;
            background: #94a3b8;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
        }

        .win-toggle-track.active .win-toggle-thumb {
            transform: translateX(16px);
            background: white;
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(0, 120, 212, 0.3);
        }

        .glass-texture {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.02;
            mix-blend-mode: overlay;
            background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBMvSzHbvWSYe_dT8_IO1aW_9aQ3Ng7VSe3AtWrNVaWG5pNqCt_bI73xVGnsDGMK4S-fhhkcNw-KgLIkrsK5voTrlkMghU2Lkx__80sTAWmEg-1mzxpbPzCjRQRCuo6aDI-7cqG6U9gcrTz46MHblbpXJPmJ5Ef-xZKf_q9ECbe939IW4C1a4gC3mKhltvHs0tazsa15p96sPGUii5XIVoMXo-VGToRXzWfy64dNi-n9hrtHpGIhS5Ld9UaglUbkM9Y6m8WHlagDAs');
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- TypeScript Interfaces (Mocked for Babel) ---
        /**
         * interface DisplayInfo {
         *   id: number;
         *   name: string;
         *   brightness: number;
         *   hdrActive: boolean;
         *   isMain: boolean;
         * }
         */

        const TAURI_INVOKE = window.__TAURI__?.invoke;
        const TAURI_LISTEN = window.__TAURI_METADATA__ ? window.__TAURI__.event.listen : null;

        // Mocking for browser preview
        const invoke = async (cmd, args = {}) => {
            if (TAURI_INVOKE) return TAURI_INVOKE(cmd, args);
            console.log(`[Tauri Mock] invoke('${cmd}')`, args);
            return null;
        };

        const App = () => {
            const [displays, setDisplays] = useState([
                { id: 0, name: 'ProArt PA32UCG', brightness: 240, hdrActive: true },
                { id: 1, name: 'ROG Swift PG279QM', brightness: 180, hdrActive: false }
            ]);
            const [activeDisplayId, setActiveDisplayId] = useState(0);
            
            const currentDisplay = displays.find(d => d.id === activeDisplayId) || displays[0];

            // Update local state and backend
            const handleBrightnessChange = (e) => {
                const nits = parseInt(e.target.value, 10);
                setDisplays(prev => prev.map(d => 
                    d.id === activeDisplayId ? { ...d, brightness: nits } : d
                ));
                
                // Debounced logic would go here in a production env
                invoke('set_brightness', { displayId: activeDisplayId, nits });
            };

            const toggleHdr = () => {
                const newState = !currentDisplay.hdrActive;
                setDisplays(prev => prev.map(d => 
                    d.id === activeDisplayId ? { ...d, hdrActive: newState } : d
                ));
                
                invoke('toggle_hdr', { displayId: activeDisplayId, active: newState });
            };

            const closeApp = () => {
                invoke('close_window').catch(() => window.close());
            };

            // Listen for system updates
            useEffect(() => {
                let unlisten = null;

                const setupListener = async () => {
                    if (TAURI_LISTEN) {
                        unlisten = await TAURI_LISTEN('display-update', (event) => {
                            const payload = event.payload; // { displayId, brightness, hdrActive }
                            setDisplays(prev => prev.map(d => 
                                d.id === payload.displayId ? { ...d, ...payload } : d
                            ));
                        });
                    }
                };

                setupListener();
                return () => { if (unlisten) unlisten(); };
            }, []);

            return (
                <main className="mica-window">
                    {/* Slim Title Bar */}
                    <header className="flex justify-between items-center h-8 px-3 w-full bg-white/5 border-b border-white/5 z-10">
                        <div className="flex items-center gap-2">
                            <span className="text-[10px] font-semibold text-white/80 tracking-wide uppercase">HDR Toolbox</span>
                        </div>
                        <div className="flex items-center">
                            <button className="w-8 h-8 flex items-center justify-center hover:bg-white/5 transition-colors text-slate-400 hover:text-white">
                                <span className="material-symbols-outlined text-[16px]">settings</span>
                            </button>
                            <button 
                                onClick={closeApp}
                                className="w-8 h-8 flex items-center justify-center hover:bg-red-500 transition-colors text-slate-400 hover:text-white"
                            >
                                <span className="material-symbols-outlined text-[16px]">close</span>
                            </button>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <div className="flex flex-1 overflow-hidden z-10">
                        {/* Side Nav */}
                        <nav className="flex flex-col w-12 h-full py-2 bg-black/10 border-r border-white/5 items-center gap-3">
                            {displays.map(display => (
                                <button 
                                    key={display.id}
                                    onClick={() => setActiveDisplayId(display.id)}
                                    className={`flex flex-col items-center justify-center w-8 h-8 rounded transition-all ${
                                        activeDisplayId === display.id 
                                        ? 'bg-[#0078d4]/20 text-[#0078d4]' 
                                        : 'hover:bg-white/5 text-slate-500'
                                    }`}
                                    title={display.name}
                                >
                                    <span 
                                        className="material-symbols-outlined text-[18px]" 
                                        style={{ fontVariationSettings: activeDisplayId === display.id ? "'FILL' 1" : "''" }}
                                    >
                                        monitor
                                    </span>
                                </button>
                            ))}
                        </nav>

                        {/* Content */}
                        <section className="flex-1 flex flex-col justify-between p-4 pt-3 pb-3">
                            <div className="space-y-3">
                                <div className="flex justify-between items-baseline">
                                    <label className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">SDR Brightness</label>
                                    <div className="flex items-baseline gap-0.5">
                                        <span className="text-2xl font-bold text-white text-glow leading-none">
                                            {currentDisplay.brightness}
                                        </span>
                                        <span className="text-[10px] font-medium text-[#0078d4] opacity-80">nits</span>
                                    </div>
                                </div>

                                {/* Custom Slider Track Visual */}
                                <div className="relative w-full h-4 flex items-center">
                                    <div 
                                        className="absolute h-1 bg-[#0078d4] rounded-full z-0" 
                                        style={{ width: `${(currentDisplay.brightness / 1000) * 100}%` }}
                                    ></div>
                                    <input 
                                        type="range" 
                                        min="0" 
                                        max="1000" 
                                        value={currentDisplay.brightness}
                                        onChange={handleBrightnessChange}
                                        className="win-slider relative z-10"
                                    />
                                </div>

                                <div className="flex justify-between -mt-1">
                                    <span className="text-[8px] font-medium text-slate-500">0</span>
                                    <span className="text-[8px] font-medium text-slate-500">1000 nits</span>
                                </div>
                            </div>

                            {/* Status Bar */}
                            <div className="flex flex-col gap-1 px-2.5 py-2 bg-white/[0.03] rounded-md border border-white/[0.05] mt-auto">
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-2">
                                        <div className={`w-1.5 h-1.5 rounded-full shadow-[0_0_8px] transition-colors ${
                                            currentDisplay.hdrActive ? 'bg-emerald-500 shadow-emerald-500/50' : 'bg-slate-600'
                                        }`}></div>
                                        <span className="text-[9px] font-semibold text-slate-300 uppercase tracking-tight">
                                            {currentDisplay.hdrActive ? 'HDR10 Active' : 'SDR Mode'}
                                        </span>
                                    </div>

                                    {/* Custom Win Toggle */}
                                    <div className="flex items-center gap-2 group cursor-pointer" onClick={toggleHdr}>
                                        <span className="text-[9px] font-semibold text-slate-400 group-hover:text-slate-200 transition-colors uppercase tracking-tight">HDR Toggle</span>
                                        <div className={`win-toggle-track ${currentDisplay.hdrActive ? 'active' : ''}`}>
                                            <div className="win-toggle-thumb"></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center pt-1 border-t border-white/[0.03]">
                                    <span className="text-[7px] font-medium text-slate-500 uppercase tracking-widest">Status: Connected</span>
                                    <span className="text-[8px] font-black text-[#0078d4]/90 tracking-widest uppercase">
                                        {currentDisplay.hdrActive ? 'PQ MODE' : 'GAMMA 2.2'}
                                    </span>
                                </div>
                            </div>
                        </section>
                    </div>

                    <div className="glass-texture"></div>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body></html>
